/* =========================================================
   Persistencia (localStorage)
   ========================================================= */
const LS_KEY = 'nexo_core_v3_data';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (typeof data.bcv === 'number') STATE.bcv = data.bcv;
    if (data.tenants) {
      Object.entries(data.tenants).forEach(([k, t]) => {
        if (STATE.tenants[k]) {
          if (Array.isArray(t.inventario)) STATE.tenants[k].inventario = t.inventario;
          if (Array.isArray(t.gastos))     STATE.tenants[k].gastos = t.gastos;
          if (Array.isArray(t.ventas))     STATE.tenants[k].ventas = t.ventas;
        }
      });
    }
  } catch (err) {
    console.warn('No se pudo leer el almacenamiento local', err);
  }
}

function saveToStorage() {
  const data = {
    bcv: STATE.bcv,
    tenants: Object.fromEntries(
      Object.entries(STATE.tenants).map(([k, t]) => [k, {
        inventario: t.inventario,
        gastos: t.gastos,
        ventas: t.ventas,
      }])
    ),
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); }
  catch (err) { console.warn('No se pudo guardar en almacenamiento local', err); }
}

function resetStorage() {
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* =========================================================
   Utilidades
   ========================================================= */
const $ = (sel, ctx=document) => ctx.querySelector(sel);
const $$ = (sel, ctx=document) => Array.from(ctx.querySelectorAll(sel));
const fmtUSD = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBS  = n => 'Bs ' + Number(n).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const usdToBs = usd => usd * STATE.bcv;
const bsToUsd = bs  => bs / STATE.bcv;

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => t.classList.add('hidden'), 2200);
}

function tenant() { return STATE.tenants[STATE.currentTenant]; }

/* =========================================================
   Render principal
   ========================================================= */
function render() {
  // Si hay sesión activa, aplicar permisos y forzar tenant antes de renderizar
  if (typeof applySessionToUI === 'function' && STATE.session) {
    applySessionToUI();
  }

  const bcvEl = $('#bcv-side');
  if (bcvEl) bcvEl.textContent = STATE.bcv.toFixed(2);
  $('#tenant-title').textContent = tenant().name;

  $$('#tenant-switcher').forEach(s => s.value = STATE.currentTenant);
  $$('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.nav === STATE.view);
  });

  const view = $('#view');
  view.innerHTML = '';
  view.appendChild(VIEWS[STATE.view]());
  view.classList.remove('fade-in'); void view.offsetWidth; view.classList.add('fade-in');
}

function renderPOS() {
  const t = tenant();
  const q = ($('#pos-search')?.value || '').toLowerCase();
  const grid = $('#pos-grid');
  if (!grid) return;
  grid.innerHTML = t.productos
    .filter(p => p.nombre.toLowerCase().includes(q))
    .map((p, i) => `
      <button class="glass p-3 text-left hover:neon-border transition" onclick="addToCart(${i})">
        <div class="text-xs text-muted">${t.type}</div>
        <div class="font-semibold text-sm leading-tight mt-1">${p.nombre}</div>
        <div class="mt-2 text-neon font-bold">${fmtUSD(p.precio)}</div>
        <div class="text-[11px] text-muted">${fmtBS(usdToBs(p.precio))}</div>
      </button>
    `).join('');

  const list = $('#cart-list');
  if (STATE.cart.length === 0) {
    list.innerHTML = `<div class="text-muted text-sm text-center py-8">Carrito vacío</div>`;
  } else {
    list.innerHTML = STATE.cart.map((c,i) => `
      <div class="glass p-3 flex items-center justify-between">
        <div>
          <div class="text-sm font-medium">${c.nombre}</div>
          <div class="text-xs text-muted">${fmtUSD(c.precio)} · ${fmtBS(usdToBs(c.precio))}</div>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost !py-0.5 !px-2 text-sm" onclick="changeQty(${i},-1)">−</button>
          <span class="w-6 text-center text-sm">${c.qty}</span>
          <button class="btn btn-ghost !py-0.5 !px-2 text-sm" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
    `).join('');
  }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  $('#cart-usd').textContent = fmtUSD(totalUSD);
  $('#cart-bs').textContent = fmtBS(usdToBs(totalUSD));
}
function addToCart(i) {
  const p = tenant().productos[i];
  const found = STATE.cart.find(c => c.nombre === p.nombre);
  if (found) found.qty++;
  else STATE.cart.push({ ...p, qty: 1 });
  renderPOS();
}
function changeQty(i, d) {
  STATE.cart[i].qty += d;
  if (STATE.cart[i].qty <= 0) STATE.cart.splice(i,1);
  renderPOS();
}
function checkout() {
  if (!STATE.cart.length) { toast('El carrito está vacío'); return; }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  // Descuento de stock local
  const inv = tenant().inventario;
  STATE.cart.forEach(c => {
    const p = inv.find(x => x.nombre === c.nombre);
    if (p && typeof p.stock === 'number') p.stock = Math.max(0, p.stock - c.qty);
  });
  // Persistir venta en histórico local
  const venta = {
    id: 'V-' + Date.now().toString(36).toUpperCase(),
    fecha: new Date().toISOString(),
    tenantKey: STATE.currentTenant,
    tenantName: tenant().name,
    items: STATE.cart.map(c => {
      const invItem = tenant().inventario.find(x => x.nombre === c.nombre);
      return { nombre: c.nombre, qty: c.qty, precio: c.precio, sku: invItem?.sku || '' };
    }),
    totalUSD,
    bcv: STATE.bcv,
    totalBS: usdToBs(totalUSD),
  };
  tenant().ventas = tenant().ventas || [];
  tenant().ventas.unshift(venta);
  saveToStorage();
  // Persistir en Supabase (en paralelo, sin bloquear la UI)
  if (typeof registrarVentaSupabase === 'function') {
    registrarVentaSupabase(venta).then(({ error }) => {
      if (error) console.error('[Supabase] Error al registrar venta:', error.message);
      else console.log('[Supabase] Venta registrada:', venta.id);
    });
  }
  if (typeof descontarStockSupabase === 'function') {
    descontarStockSupabase(venta.items, STATE.currentTenant).catch(err =>
      console.error('[Supabase] Error al descontar stock:', err)
    );
  }
  STATE.cart = [];
  renderPOS();
  openReceiptModal(venta);
}

function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return /[",\n;]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportInventarioCSV() {
  const t = tenant();

    rows.push([p.sku || '', p.nombre, p.stock, precioUSD.toFixed(2), usdToBs(precioUSD).toFixed(2), STATE.bcv.toFixed(2)]);

  });
  downloadCSV(`ventas-${STATE.currentTenant}-${Date.now()}.csv`, rows);
  toast('Reporte de ventas exportado a CSV');
}

function deleteProduct(idx) {
  const inv = tenant().inventario;
  if (idx < 0 || idx >= inv.length) return;
  const removed = inv.splice(idx, 1)[0];
  // Quitar también del catálogo del POS si coincide por nombre
  tenant().productos = tenant().productos.filter(p => p.nombre !== removed.nombre);
  saveToStorage();
  toast('Producto eliminado');
  render();
}

function deleteGasto(idx) {

function barChart(data) {
  const max = Math.max(...data);
  const labels = ['E','F','M','A','M','J','J','A','S','O','N','D'];
  return `
    <div class="flex items-end gap-2 h-44">
      ${data.map((v,i) => {
        const h = (v / max) * 100;
        return `
          <div class="flex-1 flex flex-col items-center gap-1">
            <div class="w-full rounded-t-md" style="height:${h}%; background: linear-gradient(180deg, #00f2ff, rgba(0,242,255,0.15)); box-shadow: 0 0 10px rgba(0,242,255,0.25);"></div>

}

/* =========================================================
   Autenticación (sessionStorage)
   ========================================================= */
const SESSION_KEY = 'nexo_core_v3_session';

const USERS = {
  'admin':      { pass: 'nexo2026',   role: 'admin',  name: 'Super Admin',          tenantKey: null },
  'ferreteria': { pass: 'cliente123', role: 'client', name: 'Ferretería El Centro', tenantKey: 'ferreteria' }
};

function isAdmin() { return STATE.session && STATE.session.role === 'admin'; }

function applySessionToUI() {
  const s = STATE.session;
  if (!s) return;

  // Bloquear/forzar tenant para clientes
  if (s.role === 'client' && s.tenantKey) {
    STATE.currentTenant = s.tenantKey;
  }

  // Mostrar / ocultar elementos según rol
  const hideForClient = s.role !== 'admin';
  document.querySelectorAll('[data-role="admin"]').forEach(el => {
    el.classList.toggle('hidden', hideForClient);
  });

  // Si el cliente está parado en una vista restringida, mandarlo al dashboard
  if (hideForClient && (STATE.view === 'configuracion' || STATE.view === 'usuarios')) {
    STATE.view = 'dashboard';
  }

  // Avatar + datos
  const avatar = document.getElementById('user-avatar');
  const uname = document.getElementById('user-name');
  const urole = document.getElementById('user-role');
  if (avatar) avatar.textContent = (s.name || s.user).slice(0,2).toUpperCase();
  if (uname) uname.textContent = s.name || s.user;
  if (urole) urole.textContent = s.role === 'admin' ? 'Super Admin' : 'Cliente';
}

function showLogin() {
  const ov = document.getElementById('login-overlay');
  const app = document.getElementById('app-shell');
  ov.classList.remove('hidden');
  ov.classList.add('flex');
  app.classList.add('hidden');
  const errEl = document.getElementById('login-error');
  if (errEl) errEl.classList.add('hidden');
  const form = document.getElementById('form-login');
  if (form) form.reset();
  setTimeout(() => { const u = form && form.querySelector('[name="user"]'); if (u) u.focus(); }, 50);
}

function hideLogin() {
  const ov = document.getElementById('login-overlay');
  const app = document.getElementById('app-shell');
  ov.classList.add('hidden');
  ov.classList.remove('flex');
  app.classList.remove('hidden');
}

function loginAttempt(user, pass) {
  const u = USERS[user.trim().toLowerCase()];
  if (!u || u.pass !== pass) return false;
  STATE.session = {
    user: user.trim().toLowerCase(),
    role: u.role,
    name: u.name,
    tenantKey: u.tenantKey,
    loggedAt: Date.now()
  };
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(STATE.session));
  return true;
}

function restoreSession() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    STATE.session = JSON.parse(raw);
    return !!STATE.session;
  } catch { return false; }
}

function logout() {
  STATE.session = null;
  sessionStorage.removeItem(SESSION_KEY);
  STATE.view = 'dashboard';
  STATE.cart = [];
  showLogin();
  toast('Sesión cerrada');
}

function prefillLogin(user, pass) {
  const f = document.getElementById('form-login');
  if (!f) return;
  f.querySelector('[name="user"]').value = user;
  f.querySelector('[name="pass"]').value = pass;
  f.querySelector('[name="pass"]').focus();
}

document.getElementById('form-login').addEventListener('submit', e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const user = (fd.get('user') || '').toString();
  const pass = (fd.get('pass') || '').toString();
  const errEl = document.getElementById('login-error');
  if (loginAttempt(user, pass)) {
    errEl.classList.add('hidden');
    hideLogin();
    applySessionToUI();
    render();
    toast(`Bienvenido, ${STATE.session.name}`);
  } else {
    errEl.textContent = 'Usuario o clave incorrectos. Verificá tus credenciales.';
    errEl.classList.remove('hidden');
    const passEl = e.target.querySelector('[name="pass"]');
    if (passEl) { passEl.value = ''; passEl.focus(); }
  }
});

/* =========================================================
   Boot
   ========================================================= */
loadFromStorage();

if (restoreSession()) {
  hideLogin();
  applySessionToUI();
  render();
} else {
  showLogin();
}
</script>
