/* =========================================================
   Persistencia (localStorage)
   ========================================================= */
const LS_KEY = 'nexo_core_v3_data';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (typeof data.bcv === 'number') STATE.bcv = data.bcv;
    if (data.tenants) {
      Object.entries(data.tenants).forEach(([k, t]) => {
        if (STATE.tenants[k]) {
          if (Array.isArray(t.inventario)) STATE.tenants[k].inventario = t.inventario;
          if (Array.isArray(t.gastos))     STATE.tenants[k].gastos = t.gastos;
        }
      });
    }
  } catch (err) {
    console.warn('No se pudo leer el almacenamiento local', err);
  }
}

function saveToStorage() {
  const data = {
    bcv: STATE.bcv,
    tenants: Object.fromEntries(
      Object.entries(STATE.tenants).map(([k, t]) => [k, {
        inventario: t.inventario,
        gastos: t.gastos,
      }])
    ),
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); }
  catch (err) { console.warn('No se pudo guardar en almacenamiento local', err); }
}

function resetStorage() {
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* =========================================================
   Utilidades
   ========================================================= */
const $ = (sel, ctx=document) => ctx.querySelector(sel);
const $$ = (sel, ctx=document) => Array.from(ctx.querySelectorAll(sel));
const fmtUSD = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBS  = n => 'Bs ' + Number(n).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const usdToBs = usd => usd * STATE.bcv;
const bsToUsd = bs  => bs / STATE.bcv;

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => t.classList.add('hidden'), 2200);
}

function tenant() { return STATE.tenants[STATE.currentTenant]; }

/* =========================================================
   Render principal
   ========================================================= */
function render() {
  $('#bcv-side').textContent = STATE.bcv.toFixed(2);
  $('#tenant-title').textContent = tenant().name;

  $$('#tenant-switcher').forEach(s => s.value = STATE.currentTenant);
  $$('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.nav === STATE.view);
  });

  const view = $('#view');
  view.innerHTML = '';
  view.appendChild(VIEWS[STATE.view]());
  view.classList.remove('fade-in'); void view.offsetWidth; view.classList.add('fade-in');
}

/* =========================================================
   Componentes / Vistas
   ========================================================= */

  dashboard() {
    const t = tenant();
    const ventasBs = usdToBs(t.kpis.ventasUSD);
    const totalGastosUSD = t.gastos.reduce((acc, g) => acc + (g.moneda === 'USD' ? g.monto : bsToUsd(g.monto)), 0);
    const valorInvUSD = t.inventario.reduce((acc, p) => {
      const costo = p.moneda === 'USD' ? p.costoUSD : bsToUsd(p.costoBS);
      return acc + costo * p.stock;

        </div>
      </div>

      <div class="glass mt-4 p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
          <div class="text-sm font-semibold">Almacenamiento local</div>
          <div class="text-xs text-muted">Tasa BCV, inventario y gastos se guardan en este navegador. Al refrescar, los datos se conservan.</div>
        </div>
        <button id="btn-reset" class="btn btn-ghost text-sm">Restaurar datos iniciales</button>
      </div>
    `;

    setTimeout(() => {
      $('#form-bcv').addEventListener('submit', e => {
        e.preventDefault();
        const v = Number(new FormData(e.target).get('bcv'));
        if (!v || v <= 0) return;
        STATE.bcv = v;
        saveToStorage();
        toast(`Tasa BCV actualizada a Bs ${v.toFixed(2)} / USD`);
        render();
      });
      const usd = $('#conv-usd'), bs = $('#conv-bs');
      usd.addEventListener('input', () => bs.value = (Number(usd.value) * STATE.bcv).toFixed(2));
      bs.addEventListener('input', () => usd.value = (Number(bs.value) / STATE.bcv).toFixed(2));

      const btnReset = $('#btn-reset');
      if (btnReset) btnReset.addEventListener('click', () => {
        if (confirm('¿Restaurar datos iniciales? Se borrarán tus productos, gastos y tasa BCV guardados.')) {
          resetStorage();
        }
      });
    }, 0);

    return wrap;
  },
};

/* =========================================================
   POS helpers
   ========================================================= */
function renderPOS() {
  const t = tenant();
  const q = ($('#pos-search')?.value || '').toLowerCase();
  const grid = $('#pos-grid');
  if (!grid) return;
  grid.innerHTML = t.productos
    .filter(p => p.nombre.toLowerCase().includes(q))
    .map((p, i) => `
      <button class="glass p-3 text-left hover:neon-border transition" onclick="addToCart(${i})">
        <div class="text-xs text-muted">${t.type}</div>
        <div class="font-semibold text-sm leading-tight mt-1">${p.nombre}</div>
        <div class="mt-2 text-neon font-bold">${fmtUSD(p.precio)}</div>
        <div class="text-[11px] text-muted">${fmtBS(usdToBs(p.precio))}</div>
      </button>
    `).join('');

  const list = $('#cart-list');
  if (STATE.cart.length === 0) {
    list.innerHTML = `<div class="text-muted text-sm text-center py-8">Carrito vacío</div>`;
  } else {
    list.innerHTML = STATE.cart.map((c,i) => `
      <div class="glass p-3 flex items-center justify-between">
        <div>
          <div class="text-sm font-medium">${c.nombre}</div>
          <div class="text-xs text-muted">${fmtUSD(c.precio)} · ${fmtBS(usdToBs(c.precio))}</div>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost !py-0.5 !px-2 text-sm" onclick="changeQty(${i},-1)">−</button>
          <span class="w-6 text-center text-sm">${c.qty}</span>
          <button class="btn btn-ghost !py-0.5 !px-2 text-sm" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
    `).join('');
  }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  $('#cart-usd').textContent = fmtUSD(totalUSD);
  $('#cart-bs').textContent = fmtBS(usdToBs(totalUSD));
}
function addToCart(i) {
  const p = tenant().productos[i];
  const found = STATE.cart.find(c => c.nombre === p.nombre);
  if (found) found.qty++;
  else STATE.cart.push({ ...p, qty: 1 });
  renderPOS();
}
function changeQty(i, d) {
  STATE.cart[i].qty += d;
  if (STATE.cart[i].qty <= 0) STATE.cart.splice(i,1);
  renderPOS();
}
function checkout() {
  if (!STATE.cart.length) { toast('El carrito está vacío'); return; }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  // Descuento de stock si el producto existe en el inventario
  const inv = tenant().inventario;
  STATE.cart.forEach(c => {
    const p = inv.find(x => x.nombre === c.nombre);
    if (p && typeof p.stock === 'number') p.stock = Math.max(0, p.stock - c.qty);
  });
  saveToStorage();
  toast(`Venta procesada: ${fmtUSD(totalUSD)} · ${fmtBS(usdToBs(totalUSD))}`);
  STATE.cart = [];
  renderPOS();
}

function deleteProduct(idx) {
  const inv = tenant().inventario;
  if (idx < 0 || idx >= inv.length) return;
  const removed = inv.splice(idx, 1)[0];
  // Quitar también del catálogo del POS si coincide por nombre
  tenant().productos = tenant().productos.filter(p => p.nombre !== removed.nombre);
  saveToStorage();
  toast('Producto eliminado');
  render();
}

function deleteGasto(idx) {
  const g = tenant().gastos;
  if (idx < 0 || idx >= g.length) return;
  g.splice(idx, 1);
  saveToStorage();
  toast('Gasto eliminado');
  render();
}

/* =========================================================
   Componentes auxiliares (HTML strings)
   ========================================================= */
function kpiCard(label, valueMain, valueSub, trend, trendVal) {
  const trendColor = trend === 'up' ? 'text-emerald-400' : trend === 'down' ? 'text-rose-400' : 'text-muted';
  const arrow = trend === 'up' ? '▲' : trend === 'down' ? '▼' : '·';
  return `
    <div class="glass p-5">
      <div class="flex items-center justify-between">
        <div class="text-[11px] uppercase tracking-widest text-muted">${label}</div>
        <span class="text-xs ${trendColor}">${arrow} ${trendVal}</span>
      </div>
      <div class="mt-2 text-2xl font-bold">${valueMain}</div>
      <div class="text-xs text-muted mt-1">${valueSub}</div>
    </div>
  `;
}

function reportCard(label, value, sub, color) {
  return `
    <div class="glass p-5">
      <div class="text-[11px] uppercase tracking-widest text-muted">${label}</div>
      <div class="text-2xl font-bold mt-1" style="color:${color}; text-shadow: 0 0 12px ${color}55;">${value}</div>
      <div class="text-xs text-muted mt-1">${sub}</div>
    </div>
  `;
}

function barChart(data) {
  const max = Math.max(...data);
  const labels = ['E','F','M','A','M','J','J','A','S','O','N','D'];
  return `
    <div class="flex items-end gap-2 h-44">
      ${data.map((v,i) => {
        const h = (v / max) * 100;
        return `
          <div class="flex-1 flex flex-col items-center gap-1">
            <div class="w-full rounded-t-md" style="height:${h}%; background: linear-gradient(180deg, #00f2ff, rgba(0,242,255,0.15)); box-shadow: 0 0 10px rgba(0,242,255,0.25);"></div>
            <span class="text-[10px] text-muted">${labels[i]}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* =========================================================
   Eventos globales
   ========================================================= */
function setView(v) { STATE.view = v; render(); }

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-nav]');
  if (btn) setView(btn.dataset.nav);
});

document.addEventListener('change', e => {
  if (e.target && e.target.id === 'tenant-switcher') {
    STATE.currentTenant = e.target.value;
    STATE.cart = [];
    saveToStorage();
    toast(`Cambiado a: ${tenant().name}`);
    render();
  }
});

loadFromStorage();
render();
</script>
</body>
