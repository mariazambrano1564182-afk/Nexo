/* =========================================================
   Persistencia (localStorage)
   ========================================================= */
const LS_KEY = 'nexo_core_v3_data';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (typeof data.bcv === 'number') STATE.bcv = data.bcv;
    if (data.tenants) {
      Object.entries(data.tenants).forEach(([k, t]) => {
        if (STATE.tenants[k]) {
          // Restore mutable fields
          if (Array.isArray(t.inventario))    STATE.tenants[k].inventario    = t.inventario;
          if (Array.isArray(t.gastos))        STATE.tenants[k].gastos        = t.gastos;
          if (Array.isArray(t.ventas))        STATE.tenants[k].ventas        = t.ventas;
          if (t.plan_type)                    STATE.tenants[k].plan_type     = t.plan_type;
          if (t.status)                       STATE.tenants[k].status        = t.status;
          if (t.expiration_date)              STATE.tenants[k].expiration_date = t.expiration_date;
        } else if (t._dynamic) {
          // Restore fully dynamic tenants (newly registered)
          STATE.tenants[k] = t;
        }
      });
    }
  } catch (err) {
    console.warn('No se pudo leer el almacenamiento local', err);
  }
}

function saveToStorage() {
  const data = {
    bcv: STATE.bcv,
    tenants: Object.fromEntries(
      Object.entries(STATE.tenants).map(([k, t]) => [k, {
        _dynamic:        t._dynamic || false,
        name:            t.name,
        type:            t.type,
        city:            t.city,
        manager:         t.manager,
        plan_type:       t.plan_type,
        status:          t.status,
        expiration_date: t.expiration_date,
        kpis:            t.kpis,
        inventario:      t.inventario,
        gastos:          t.gastos,
        ventas:          t.ventas,
        ventasMes:       t.ventasMes,
        productos:       t.productos,
      }])
    ),
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); }
  catch (err) { console.warn('No se pudo guardar en almacenamiento local', err); }
}

function resetStorage() {
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* =========================================================
   Utilidades
   ========================================================= */
const $ = (sel, ctx=document) => ctx.querySelector(sel);
const $$ = (sel, ctx=document) => Array.from(ctx.querySelectorAll(sel));
const fmtUSD = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBS  = n => 'Bs ' + Number(n).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const usdToBs = usd => usd * STATE.bcv;
const bsToUsd = bs  => bs / STATE.bcv;

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => t.classList.add('hidden'), 2200);
}

function tenant() { return STATE.tenants[STATE.currentTenant]; }

/* =========================================================
   tenantDataHook — Equivalente al hook useDashboardData
   Determina qué datos traer según el rol y la vista activa.
   Se ejecuta en cada ciclo de render antes de montar la UI.
   ========================================================= */
function tenantDataHook() {
  if (!STATE.session) return;
  const s = STATE.session;

  if (s.role === 'superadmin' && STATE.view === 'adminDashboard') {
    // SuperAdmin en vista global: métricas de infraestructura + lista de tenants
    // Los datos se leen directamente de STATE.tenants (sin filtro de tenant_id)
    return { mode: 'GLOBAL', tenantId: null };
  } else {
    // Comercio: forzar tenant_id del usuario — ningún dato de otro comercio es visible
    const tid = (s.role !== 'superadmin' && s.tenantKey) ? s.tenantKey : STATE.currentTenant;
    STATE.currentTenant = tid;
    return { mode: 'TENANT', tenantId: tid };
  }
}

function render() {
  // 1. Ejecutar el hook de datos: determina el contexto (GLOBAL vs TENANT)
  const dataCtx = tenantDataHook();

  // 2. Aplicar permisos, filtros de UI y protección de rutas
  if (STATE.session) applySessionToUI();

  // 3. Actualizar elementos del topbar
  const bcvEl = $('#bcv-side');
  if (bcvEl) bcvEl.textContent = STATE.bcv.toFixed(2);

  if (STATE.view === 'adminDashboard') {
    $('#tenant-title').textContent = 'Administración Global';
  } else {
    $('#tenant-title').textContent = tenant().name;
  }

  $$('#tenant-switcher').forEach(s => {
    s.value = STATE.view === 'adminDashboard' ? 'admin-global' : STATE.currentTenant;
  });
  $$('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.nav === STATE.view);
  });

  // 4. Montar la vista correspondiente al contexto de datos
  const view = $('#view');
  view.innerHTML = '';
  const viewFn = VIEWS[STATE.view];
  if (viewFn) {
    view.appendChild(viewFn());
  }
  view.classList.remove('fade-in'); void view.offsetWidth; view.classList.add('fade-in');
}

/* =========================================================
   POS helpers
   ========================================================= */
function renderPOS() {
  const t = tenant();
  const q = ($('#pos-search')?.value || '').toLowerCase();
  const grid = $('#pos-grid');
  if (!grid) return;
  grid.innerHTML = t.productos
    .filter(p => p.nombre.toLowerCase().includes(q))
    .map((p, i) => `
      <button class="glass p-3 text-left hover:neon-border transition" onclick="addToCart(${i})">
        <div class="text-xs text-muted">${t.type}</div>
        <div class="font-semibold text-sm leading-tight mt-1">${p.nombre}</div>
        <div class="mt-2 text-neon font-bold">${fmtUSD(p.precio)}</div>
        <div class="text-[11px] text-muted">${fmtBS(usdToBs(p.precio))}</div>
      </button>
    `).join('');

  const list = $('#cart-list');
  if (STATE.cart.length === 0) {
    list.innerHTML = `<div class="text-muted text-sm text-center py-8">Carrito vacío</div>`;
  } else {
    list.innerHTML = STATE.cart.map((c,i) => `
      <div class="glass p-3 flex items-center justify-between">
        <div>
          <div class="text-sm font-medium">${c.nombre}</div>
          <div class="text-xs text-muted">${fmtUSD(c.precio)} · ${fmtBS(usdToBs(c.precio))}</div>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost !py-0.5 !px-2 text-sm" onclick="changeQty(${i},-1)">−</button>
          <span class="w-6 text-center text-sm">${c.qty}</span>
          <button class="btn btn-ghost !py-0.5 !px-2 text-sm" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
    `).join('');
  }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  $('#cart-usd').textContent = fmtUSD(totalUSD);
  $('#cart-bs').textContent = fmtBS(usdToBs(totalUSD));
}
function addToCart(i) {
  const p = tenant().productos[i];
  const found = STATE.cart.find(c => c.nombre === p.nombre);
  if (found) found.qty++;
  else STATE.cart.push({ ...p, qty: 1 });
  renderPOS();
}
function changeQty(i, d) {
  STATE.cart[i].qty += d;
  if (STATE.cart[i].qty <= 0) STATE.cart.splice(i,1);
  renderPOS();
}
function checkout() {
  if (!STATE.cart.length) { toast('El carrito está vacío'); return; }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  const inv = tenant().inventario;
  STATE.cart.forEach(c => {
    const p = inv.find(x => x.nombre === c.nombre);
    if (p && typeof p.stock === 'number') p.stock = Math.max(0, p.stock - c.qty);
  });
  const venta = {
    id: 'V-' + Date.now().toString(36).toUpperCase(),
    fecha: new Date().toISOString(),
    tenantKey: STATE.currentTenant,
    tenantName: tenant().name,
    items: STATE.cart.map(c => ({ nombre: c.nombre, qty: c.qty, precio: c.precio })),
    totalUSD,
    bcv: STATE.bcv,
    totalBS: usdToBs(totalUSD),
    metodoPago: 'efectivo_usd',
  };
  tenant().ventas = tenant().ventas || [];
  tenant().ventas.unshift(venta);
  saveToStorage();
  STATE.cart = [];
  renderPOS();
  openReceiptModal(venta);
}

/* =========================================================
   POS — Métodos de pago / Vuelto
   ========================================================= */
let _pagoSeleccionado = null;

function selectPago(metodo) {
  _pagoSeleccionado = metodo;
  document.querySelectorAll('.btn-pago').forEach(b => {
    b.classList.toggle('pago-active', b.dataset.pago === metodo);
  });
  const cashRow  = document.getElementById('pago-cash-row');
  const usdRow   = document.getElementById('pago-usd-row');
  const bsRow    = document.getElementById('pago-bs-row');
  const mixRows  = document.getElementById('pago-mixto-rows');
  const vuelto   = document.getElementById('vuelto-display');
  if (!cashRow) return;
  [usdRow, bsRow, mixRows, vuelto].forEach(el => el && el.classList.add('hidden'));
  if (metodo === 'usd') {
    cashRow.classList.remove('hidden');
    usdRow.classList.remove('hidden');
  } else if (metodo === 'bs') {
    cashRow.classList.remove('hidden');
    bsRow.classList.remove('hidden');
  } else if (metodo === 'mixto') {
    cashRow.classList.remove('hidden');
    mixRows.classList.remove('hidden');
  } else {
    cashRow.classList.add('hidden');
  }
  calcVuelto();
}

function calcVuelto() {
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  const totalBS  = usdToBs(totalUSD);
  const vueltoBox = document.getElementById('vuelto-display');
  const vueltoVal = document.getElementById('vuelto-val');
  if (!vueltoBox || !vueltoVal) return;

  let vueltoStr = null;
  if (_pagoSeleccionado === 'usd') {
    const billete = Number(document.getElementById('pago-billete-usd')?.value || 0);
    if (billete > 0) {
      const cambio = billete - totalUSD;
      vueltoStr = cambio >= 0
        ? `${fmtUSD(cambio)} (${fmtBS(usdToBs(cambio))})`
        : `<span style="color:#fb7185">Faltan ${fmtUSD(Math.abs(cambio))}</span>`;
    }
  } else if (_pagoSeleccionado === 'bs') {
    const billete = Number(document.getElementById('pago-billete-bs')?.value || 0);
    if (billete > 0) {
      const cambio = billete - totalBS;
      vueltoStr = cambio >= 0
        ? `${fmtBS(cambio)} (${fmtUSD(bsToUsd(cambio))})`
        : `<span style="color:#fb7185">Faltan ${fmtBS(Math.abs(cambio))}</span>`;
    }
  } else if (_pagoSeleccionado === 'mixto') {
    const mixUSD = Number(document.getElementById('pago-mix-usd')?.value || 0);
    const mixBS  = Number(document.getElementById('pago-mix-bs')?.value  || 0);
    const totalPagado = mixUSD + bsToUsd(mixBS);
    if (mixUSD > 0 || mixBS > 0) {
      const cambio = totalPagado - totalUSD;
      vueltoStr = cambio >= 0
        ? `${fmtUSD(cambio)}`
        : `<span style="color:#fb7185">Faltan ${fmtUSD(Math.abs(cambio))}</span>`;
    }
  }

  if (vueltoStr !== null) {
    vueltoBox.classList.remove('hidden');
    vueltoVal.innerHTML = vueltoStr;
  } else {
    vueltoBox.classList.add('hidden');
  }
}

function resetPago() {
  _pagoSeleccionado = null;
  document.querySelectorAll('.btn-pago').forEach(b => b.classList.remove('pago-active'));
  const cashRow = document.getElementById('pago-cash-row');
  if (cashRow) cashRow.classList.add('hidden');
}

function checkoutWithPago() {
  if (!STATE.cart.length) { toast('El carrito está vacío'); return; }
  if (!_pagoSeleccionado) { toast('Seleccioná un método de pago'); return; }
  const totalUSD = STATE.cart.reduce((a,c) => a + c.precio * c.qty, 0);
  const inv = tenant().inventario;
  STATE.cart.forEach(c => {
    const p = inv.find(x => x.nombre === c.nombre);
    if (p && typeof p.stock === 'number') p.stock = Math.max(0, p.stock - c.qty);
  });
  const metodosLabel = { usd:'Efectivo USD', bs:'Efectivo BS', movil:'Pago Móvil', punto:'Punto de venta', mixto:'Pago mixto' };

  let vueltoInfo = null;
  if (_pagoSeleccionado === 'usd') {
    const billete = Number(document.getElementById('pago-billete-usd')?.value || 0);
    if (billete > 0) vueltoInfo = { label: 'Vuelto', valor: fmtUSD(Math.max(0, billete - totalUSD)) };
  } else if (_pagoSeleccionado === 'bs') {
    const billete = Number(document.getElementById('pago-billete-bs')?.value || 0);
    if (billete > 0) vueltoInfo = { label: 'Vuelto', valor: fmtBS(Math.max(0, billete - usdToBs(totalUSD))) };
  }

  const venta = {
    id: 'V-' + Date.now().toString(36).toUpperCase(),
    fecha: new Date().toISOString(),
    tenantKey: STATE.currentTenant,
    tenantName: tenant().name,
    items: STATE.cart.map(c => ({ nombre: c.nombre, qty: c.qty, precio: c.precio })),
    totalUSD,
    bcv: STATE.bcv,
    totalBS: usdToBs(totalUSD),
    metodoPago: _pagoSeleccionado,
    metodoPagoLabel: metodosLabel[_pagoSeleccionado] || _pagoSeleccionado,
    vuelto: vueltoInfo,
  };
  tenant().ventas = tenant().ventas || [];
  tenant().ventas.unshift(venta);
  saveToStorage();
  STATE.cart = [];
  resetPago();
  renderPOS();
  openReceiptModal(venta);
}

function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return /[",\n;]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

  tenant().productos = tenant().productos.filter(p => p.nombre !== removed.nombre);

function setView(v) {
  const s = STATE.session;

  // ── Middleware: Protección de rutas ───────────────────────────────────────

  // 1. adminDashboard → SOLO superadmin. Cualquier otro intento → rebotar.
  if (v === 'adminDashboard') {
    if (!isAdmin()) {
      toast('Acceso denegado — se requiere rol SuperAdmin');
      STATE.view = 'dashboard';
      render();
      return;
    }
  }

  // 2. usuarios / configuracion → solo superadmin
  if ((v === 'usuarios' || v === 'configuracion') && !isAdmin()) {
    toast('Sin permisos para acceder a esa sección');
    return;
  }

  // 3. Operador: verificar contra su lista de vistas permitidas
  if (s && s.role === 'operador' && s.vistas) {
    const adminViews = ['usuarios', 'configuracion', 'adminDashboard'];
    if (adminViews.includes(v)) {
      toast('Acceso denegado');
      return;
    }
    if (!s.vistas.includes(v)) {
      toast(`Sin acceso a "${v.charAt(0).toUpperCase() + v.slice(1)}"`);
      return;
    }
  }

  // 4. Cliente sin vistas definidas: bloquear vistas admin-only
  if (s && s.role === 'client') {
    const adminViews = ['usuarios', 'configuracion', 'adminDashboard'];
    if (adminViews.includes(v)) {
      toast('Acceso denegado');
      return;
    }
  }

  STATE.view = v;
  render();
}

/* =========================================================
   Autenticación (sessionStorage)
   ========================================================= */
const SESSION_KEY = 'nexo_core_v3_session';

const USERS = {
  'admin':      { pass: 'nexo2026',   role: 'superadmin', name: 'Super Admin',          tenantKey: null },
  'ferreteria': { pass: 'cliente123', role: 'client',     name: 'Ferretería El Centro', tenantKey: 'ferreteria' }
};

function isAdmin()       { return STATE.session && STATE.session.role === 'superadmin'; }
function isSuperAdmin()  { return isAdmin(); }
function isClient()      { return STATE.session && (STATE.session.role === 'client' || STATE.session.role === 'operador'); }

function rebuildTenantSwitcher() {
  $$('#tenant-switcher').forEach(sel => {
    const prevVal = sel.value;
    sel.innerHTML = '';
    if (isAdmin()) {
      const adminOpt = document.createElement('option');
      adminOpt.value = 'admin-global';
      adminOpt.textContent = '⬡ ADMINISTRACIÓN GLOBAL';
      adminOpt.style.color = '#00f2ff';
      sel.appendChild(adminOpt);
    }
    Object.entries(STATE.tenants).forEach(([k, t]) => {
      const opt = document.createElement('option');
      opt.value = k;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
    if (prevVal === 'admin-global' && isAdmin()) {
      sel.value = 'admin-global';
    } else if (STATE.tenants[prevVal]) {
      sel.value = prevVal;
    } else {
      sel.value = STATE.currentTenant;
    }
  });
}

function applySessionToUI() {
  const s = STATE.session;
  if (!s) return;

  const isSA      = s.role === 'superadmin';
  const isOp      = s.role === 'operador';
  const isCl      = s.role === 'client';
  const isRestricted = !isSA;  // client OR operador

  // ── A. Forjar tenant_id: cliente/operador NUNCA puede salirse de su comercio ──
  if (isRestricted && s.tenantKey) {
    STATE.currentTenant = s.tenantKey;
  }

  // ── B. Protección de vista activa ─────────────────────────────────────────
  //   Si el usuario llegó (por URL manual o código) a una vista prohibida,
  //   redirigirlo al dashboard de su comercio.
  const adminOnlyViews = ['configuracion', 'usuarios', 'adminDashboard'];
  if (isRestricted && adminOnlyViews.includes(STATE.view)) {
    STATE.view = 'dashboard';
  }
  // Operador: si la vista no está en su lista de vistas permitidas
  if (isOp && s.vistas && !s.vistas.includes(STATE.view)) {
    STATE.view = s.vistas[0] || 'dashboard';
  }

  // ── C. Elementos con data-role="admin" → visibles solo para superadmin ────
  document.querySelectorAll('[data-role="admin"]').forEach(el => {
    el.classList.toggle('hidden', !isSA);
  });

  // ── D. Nav items para operadores (filtrar según vistas) ───────────────────
  if (isOp && s.vistas) {
    document.querySelectorAll('[data-nav]').forEach(btn => {
      const v = btn.dataset.nav;
      const adminViews = ['usuarios','configuracion','adminDashboard'];
      if (adminViews.includes(v)) {
        btn.classList.add('hidden');
      } else {
        btn.classList.toggle('hidden', !s.vistas.includes(v));
      }
    });
  } else if (!isSA) {
    // Client: ocultar solo las vistas explícitamente marcadas admin
    document.querySelectorAll('[data-nav][data-role="admin"]').forEach(btn => {
      btn.classList.add('hidden');
    });
  } else {
    // SuperAdmin: mostrar todo
    document.querySelectorAll('[data-nav]').forEach(btn => btn.classList.remove('hidden'));
  }

  // ── E. Tenant switcher (superadmin) vs. lock badge (cliente/operador) ─────
  const switcherWrap = document.getElementById('tenant-switcher-wrap');
  const lockDisplay  = document.getElementById('tenant-lock-display');
  const lockName     = document.getElementById('tenant-lock-name');

  if (isSA) {
    if (switcherWrap) switcherWrap.classList.remove('hidden');
    if (lockDisplay)  lockDisplay.classList.add('hidden');
    rebuildTenantSwitcher();
    $$('#tenant-switcher').forEach(sel => {
      sel.value = STATE.view === 'adminDashboard' ? 'admin-global' : STATE.currentTenant;
    });
  } else {
    if (switcherWrap) switcherWrap.classList.add('hidden');
    if (lockDisplay && lockName) {
      const tenantName = STATE.tenants[s.tenantKey]?.name || s.name;
      lockName.textContent = tenantName;
      lockDisplay.classList.remove('hidden');
      lockDisplay.style.display = 'flex';
    }
  }

  // ── F. Avatar + datos de usuario en topbar ────────────────────────────────
  const avatar      = document.getElementById('user-avatar');
  const uname       = document.getElementById('user-name');
  const urole       = document.getElementById('user-role');
  const sidebarBadge= document.getElementById('sidebar-role-badge');

  if (avatar) avatar.textContent = (s.name || s.user).slice(0,2).toUpperCase();
  if (uname)  uname.textContent  = s.name || s.user;
  const roleLabel = isSA ? 'Super Admin' : (isOp ? 'Operador' : 'Cliente');
  if (urole) urole.textContent = roleLabel;
  if (sidebarBadge) {
    sidebarBadge.textContent = isSA
      ? 'Super Admin'
      : (STATE.tenants[s.tenantKey]?.name || s.name);
    sidebarBadge.style.color = isSA ? '#00f2ff' : '';
  }
}

function showLogin() {
  const ov = document.getElementById('login-overlay');
  const app = document.getElementById('app-shell');
  ov.classList.remove('hidden');
  ov.classList.add('flex');
  app.classList.add('hidden');
  const errEl = document.getElementById('login-error');
  if (errEl) errEl.classList.add('hidden');
  const form = document.getElementById('form-login');
  if (form) form.reset();
  setTimeout(() => { const u = form && form.querySelector('[name="user"]'); if (u) u.focus(); }, 50);
}

function hideLogin() {
  const ov = document.getElementById('login-overlay');
  const app = document.getElementById('app-shell');
  ov.classList.add('hidden');
  ov.classList.remove('flex');
  app.classList.remove('hidden');
}

function loginAttempt(user, pass) {
  const usernameNorm = user.trim().toLowerCase();

  // ── 1. Consultar credenciales estáticas (USERS) ──────────────────────────
  const hardcodedUser = USERS[usernameNorm];

  // ── 2. Si no está en USERS, consultar STATE.usuarios (dinámicos) ──────────
  let dynamicRecord = null;
  if (!hardcodedUser) {
    dynamicRecord = STATE.usuarios.find(du => {
      const uname = (du.username || du.email.split('@')[0]).toLowerCase();
      return uname === usernameNorm && du.clave === pass;
    });
    if (!dynamicRecord) return false;
  } else if (hardcodedUser.pass !== pass) {
    return false;
  }

  // ── 3. Construir objeto de sesión ─────────────────────────────────────────
  if (dynamicRecord) {
    // Usuario operador creado dinámicamente
    const assignedTenant = (dynamicRecord.comercio && dynamicRecord.comercio !== 'all')
      ? dynamicRecord.comercio
      : Object.keys(STATE.tenants)[0];
    STATE.session = {
      user: usernameNorm,
      role: 'operador',
      name: dynamicRecord.nombre,
      tenantKey: assignedTenant,
      vistas: dynamicRecord.vistas || ['dashboard'],
      loggedAt: Date.now()
    };
  } else {
    STATE.session = {
      user: usernameNorm,
      role: hardcodedUser.role,
      name: hardcodedUser.name,
      tenantKey: hardcodedUser.tenantKey,
      vistas: null,   // null = acceso total (superadmin o client básico)
      loggedAt: Date.now()
    };
  }

  // ── 4. Determinar vista inicial y tenant según rol ────────────────────────
  if (STATE.session.role === 'superadmin') {
    // SuperAdmin: ir directo al dashboard de infraestructura
    STATE.view = 'adminDashboard';
    // tenant_id global = null (no aplica filtro por comercio)
    STATE.currentTenant = Object.keys(STATE.tenants)[0];
  } else {
    // Cliente / Operador: ir al dashboard del propio comercio
    STATE.view = 'dashboard';
    STATE.currentTenant = STATE.session.tenantKey || Object.keys(STATE.tenants)[0];
  }

  sessionStorage.setItem(SESSION_KEY, JSON.stringify(STATE.session));
  return true;
}

function restoreSession() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    STATE.session = JSON.parse(raw);
    return !!STATE.session;
  } catch { return false; }
}

function logout() {
  STATE.session = null;
  sessionStorage.removeItem(SESSION_KEY);
  STATE.view = 'dashboard';
  STATE.cart = [];
  showLogin();
  toast('Sesión cerrada');
}

function prefillLogin(user, pass) {
  const f = document.getElementById('form-login');
  if (!f) return;
  f.querySelector('[name="user"]').value = user;
  f.querySelector('[name="pass"]').value = pass;
  f.querySelector('[name="pass"]').focus();
}

document.getElementById('form-login').addEventListener('submit', e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const user = (fd.get('user') || '').toString();
  const pass = (fd.get('pass') || '').toString();
  const errEl = document.getElementById('login-error');
  if (loginAttempt(user, pass)) {
    errEl.classList.add('hidden');
    hideLogin();
    applySessionToUI();
    render();
    toast(`Bienvenido, ${STATE.session.name}`);
  } else {
    errEl.textContent = 'Usuario o clave incorrectos. Verificá tus credenciales.';
    errEl.classList.remove('hidden');
    const passEl = e.target.querySelector('[name="pass"]');
    if (passEl) { passEl.value = ''; passEl.focus(); }
  }
});

/* =========================================================
   Boot
   ========================================================= */
loadFromStorage();

if (restoreSession()) {
  hideLogin();
  applySessionToUI();
  render();
} else {
  showLogin();
}
</script>
</body>
</html>
